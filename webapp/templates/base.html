<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vietnamese TextVoice Studio</title>
    <meta
      name="description"
      content="Studio text to speech tiếng Việt với Gwen-TTS làm model chủ chốt."
    />
    <link
      rel="icon"
      type="image/png"
      href="{{ url_for('static', filename='images/logo_ubgr.png', v=static_version) }}"
    />
    <link
      rel="shortcut icon"
      type="image/png"
      href="{{ url_for('static', filename='images/logo_ubgr.png', v=static_version) }}"
    />
    <link
      rel="apple-touch-icon"
      href="{{ url_for('static', filename='images/logo_ubgr.png', v=static_version) }}"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css', v=static_version) }}"
    />
  </head>
  <body class="page-{{ active }}">
    <div class="site-shell">
      <header class="site-header">
        <div class="logo">
          <div class="logo-mark">
            <img
              src="{{ url_for('static', filename='images/logo.png', v=static_version) }}"
              alt=""
              class="logo-mark-image"
            />
          </div>
          <div>
            <b>Vietnamese TextVoice Studio</b>
            <span>Using for personal tasks</span>
          </div>
        </div>

        <nav>
          <a href="{{ url_for('engine_page', engine_id='gwen') }}" class="{{ 'active' if active == 'gwen' }}">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7h16M4 12h16M4 17h10" />
            </svg>
            Studio
          </a>
          <a href="{{ url_for('voices_page') }}" class="{{ 'active' if active == 'voices' }}">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m-4 0h8" />
            </svg>
            Voices
          </a>
          <a href="{{ url_for('asr_page') }}" class="{{ 'active' if active == 'asr' }}">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m-4 0h8M12 1a3 3 0 00-3 3v7a3 3 0 006 0V4a3 3 0 00-3-3z" />
            </svg>
            ASR
          </a>
        </nav>

        <div class="header-status"></div>
      </header>

      <main class="{{ 'studio-main' if active not in ['voices', 'asr'] else '' }}{{ ' voices-main' if active == 'voices' else '' }}{{ ' asr-main' if active == 'asr' else '' }}">{% block content %}{% endblock %}</main>

      <footer>
        <div class="footer-inner">
          <span>© 2026 Sin Tran</span>
          <span class="footer-sep">·</span>
          <span>Vietnamese TTS Studio</span>
        </div>
      </footer>
    </div>
  </body>
</html>
